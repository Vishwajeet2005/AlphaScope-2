<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AlphaScope — Dashboard</title>
<link rel="stylesheet" href="/css/main.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
.app-shell{display:flex;flex-direction:column;height:calc(100vh - 56px);overflow:hidden;}
.ticker-strip{flex-shrink:0;background:var(--bg2);border-bottom:1px solid var(--border);overflow:hidden;height:32px;display:flex;align-items:center;}
.ticker-inner{display:flex;white-space:nowrap;animation:ticker-scroll 80s linear infinite;}
.ticker-inner:hover{animation-play-state:paused;}
@keyframes ticker-scroll{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
.tk{display:inline-flex;align-items:center;gap:6px;padding:0 16px;border-right:1px solid var(--border);font-family:var(--font-mono);font-size:11px;height:32px;cursor:pointer;transition:background .1s;white-space:nowrap;}
.tk:hover{background:var(--bg3);}
.tk-type{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;}
.tk-sym{font-weight:700;color:var(--text);}
.tk-price{color:var(--text2);}
.tk-up{color:var(--green);}.tk-dn{color:var(--red);}

.body-area{flex:1;display:grid;grid-template-columns:300px 1fr 272px;overflow:hidden;}

/* FEED */
.feed-col{background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
.feed-hdr{padding:10px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.feed-title{font-family:var(--font-mono);font-size:10px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:1px;}
.feed-cnt{font-family:var(--font-mono);font-size:11px;font-weight:700;background:var(--green);color:#fff;border-radius:8px;padding:1px 7px;}
.feed-list{flex:1;overflow-y:auto;padding:7px;}
.sig-card{border:1px solid var(--border);border-radius:9px;padding:10px;margin-bottom:5px;cursor:pointer;transition:all .15s;background:var(--bg3);}
.sig-card:hover{border-color:var(--border2);background:var(--bg4);transform:translateX(2px);}
.sig-card.active{border-color:var(--green);background:var(--bg4);box-shadow:0 0 0 1px var(--green);}
.sc-top{display:flex;justify-content:space-between;margin-bottom:6px;}
.sc-l .sc-sym{font-family:var(--font-mono);font-size:13px;font-weight:700;}
.sc-l .sc-name{font-size:10px;color:var(--text2);max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.sc-r{display:flex;flex-direction:column;align-items:flex-end;gap:4px;}
.bm-star{background:none;border:none;font-size:14px;color:var(--text3);transition:color .15s;line-height:1;padding:0;cursor:pointer;}
.bm-star:hover,.bm-star.on{color:var(--amber);}
.pr-row{display:flex;align-items:baseline;gap:5px;margin-bottom:6px;}
.pr-big{font-family:var(--font-mono);font-size:14px;font-weight:700;}
.pr-chg{font-family:var(--font-mono);font-size:10px;}
.up{color:var(--green);}.dn{color:var(--red);}
.chips{display:flex;flex-wrap:wrap;gap:3px;}
.chip{font-size:8px;font-family:var(--font-mono);padding:1px 5px;border-radius:3px;}
.chip-p{background:var(--purple-bg);color:var(--purple);}
.chip-r{background:var(--blue-bg);color:var(--blue);}
.sc-bars{display:flex;gap:8px;margin-top:6px;padding-top:6px;border-top:1px solid var(--border);}
.bar-item{display:flex;flex-direction:column;gap:2px;}
.bar-lbl{font-size:8px;color:var(--text3);font-family:var(--font-mono);text-transform:uppercase;}
.bar-wrap{display:flex;align-items:center;gap:3px;}
.bar-bg{width:48px;height:3px;background:var(--border);border-radius:2px;}
.bar-fill{height:3px;border-radius:2px;}
.bar-n{font-size:8px;font-family:var(--font-mono);color:var(--text2);}

/* DETAIL */
.detail-col{overflow-y:auto;padding:16px;background:var(--bg);}
.d-hdr{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px;gap:10px;}
.d-sym{font-family:var(--font-display);font-size:22px;font-weight:800;}
.d-name{font-size:12px;color:var(--text2);margin-top:2px;}
.d-sector{display:inline-block;font-size:10px;font-family:var(--font-mono);background:var(--bg3);border:1px solid var(--border2);border-radius:3px;padding:1px 6px;color:var(--text2);margin-top:3px;}
.d-price-block{text-align:right;display:flex;flex-direction:column;align-items:flex-end;gap:5px;}
.d-price{font-family:var(--font-mono);font-size:24px;font-weight:700;}
.bm-detail-btn{background:transparent;border:1px solid var(--border2);border-radius:5px;padding:4px 11px;font-size:10px;color:var(--text2);font-family:var(--font-mono);transition:all .15s;display:flex;align-items:center;gap:4px;cursor:pointer;}
.bm-detail-btn:hover,.bm-detail-btn.on{border-color:var(--amber);color:var(--amber);background:var(--amber-bg);}
.range-box{background:var(--bg2);border:1px solid var(--border);border-radius:9px;padding:12px;margin-bottom:12px;}
.range-track{position:relative;height:5px;background:var(--border);border-radius:3px;margin:8px 0;}
.range-gradient{position:absolute;inset:0;background:linear-gradient(90deg,var(--red),var(--amber),var(--green));border-radius:3px;opacity:.5;}
.range-dot{position:absolute;top:-5px;width:15px;height:15px;border-radius:50%;background:var(--amber);border:2px solid var(--bg2);transform:translateX(-50%);}
.range-labels{display:flex;justify-content:space-between;font-size:10px;font-family:var(--font-mono);color:var(--text2);}
.chart-box{background:var(--bg2);border:1px solid var(--border);border-radius:9px;padding:12px;margin-bottom:12px;}
.chart-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.chart-lbl{font-family:var(--font-mono);font-size:10px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.8px;}
.chart-tabs{display:flex;gap:3px;}
.c-tab{font-size:10px;font-family:var(--font-mono);padding:3px 8px;border-radius:4px;border:1px solid var(--border);color:var(--text2);background:transparent;transition:all .15s;cursor:pointer;}
.c-tab.active{background:var(--green);color:#fff;border-color:var(--green);font-weight:700;}
.chart-wrap{height:200px;position:relative;}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;}
.box{background:var(--bg2);border:1px solid var(--border);border-radius:9px;padding:12px;}
.box-t{font-family:var(--font-mono);font-size:9px;text-transform:uppercase;letter-spacing:1px;color:var(--text3);margin-bottom:8px;}
.pat-name{font-size:12px;font-weight:600;color:var(--purple);margin-bottom:3px;}
.pat-det{font-size:10px;color:var(--text2);line-height:1.5;}
.wr-row{display:flex;align-items:center;gap:6px;margin-top:8px;}
.wr-lbl{font-size:9px;color:var(--text3);font-family:var(--font-mono);}
.wr-bg{flex:1;height:4px;background:var(--border);border-radius:2px;}
.wr-fill{height:4px;border-radius:2px;background:var(--green);}
.wr-pct{font-size:10px;font-family:var(--font-mono);font-weight:700;color:var(--green);}
.ev-item{display:flex;gap:6px;align-items:flex-start;padding:5px 7px;background:var(--bg3);border-radius:4px;border-left:2px solid var(--blue);margin-bottom:4px;}
.ev-score{font-family:var(--font-mono);font-size:10px;font-weight:700;color:var(--amber);white-space:nowrap;}
.ev-desc{font-size:10px;color:var(--text2);line-height:1.4;}
.brief-box{background:var(--bg2);border:1px solid var(--border);border-left:3px solid var(--green);border-radius:9px;padding:13px;margin-bottom:12px;}
.brief-hdr{display:flex;align-items:center;gap:7px;margin-bottom:8px;}
.brief-tag{font-family:var(--font-mono);font-size:9px;font-weight:700;background:var(--green);color:#fff;padding:2px 6px;border-radius:3px;}
.brief-text{font-size:12px;line-height:1.75;}
.cm-wrap{background:var(--bg2);border:1px solid var(--border);border-radius:9px;padding:11px 13px;margin-bottom:12px;display:flex;align-items:center;gap:12px;}
.cm-lbl{font-family:var(--font-mono);font-size:9px;text-transform:uppercase;letter-spacing:.8px;color:var(--text3);white-space:nowrap;}
.cm-track{flex:1;height:5px;background:var(--border);border-radius:3px;overflow:hidden;}
.cm-fill{height:100%;border-radius:3px;transition:width .9s ease;}
.cm-val{font-family:var(--font-mono);font-size:11px;font-weight:700;white-space:nowrap;}
.empty-detail{display:flex;flex-direction:column;align-items:center;justify-content:center;height:80%;gap:10px;color:var(--text3);}
.empty-icon{font-size:40px;opacity:.4;}
.empty-title{font-family:var(--font-mono);font-size:12px;color:var(--text2);}

/* SIDEBAR */
.sidebar{background:var(--bg2);border-left:1px solid var(--border);overflow-y:auto;padding:10px;display:flex;flex-direction:column;gap:10px;}
.sb-section{background:var(--bg3);border:1px solid var(--border);border-radius:9px;padding:11px;}
.sb-title{font-family:var(--font-mono);font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--text3);margin-bottom:9px;}
.mkt-item{display:flex;align-items:center;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--border);}
.mkt-item:last-child{border-bottom:none;}
.mkt-label{font-size:11px;font-weight:500;color:var(--text);}
.mkt-sub{font-size:9px;color:var(--text3);font-family:var(--font-mono);}
.mkt-price{font-family:var(--font-mono);font-size:12px;font-weight:700;text-align:right;}
.mkt-chg{font-family:var(--font-mono);font-size:10px;text-align:right;}

/* FEAR GAUGE */
.fear-gauge{text-align:center;}
.gauge-svg{display:block;margin:0 auto;}
.gauge-arc-bg{fill:none;stroke:var(--border);stroke-width:10;stroke-linecap:round;}
.gauge-arc-fill{fill:none;stroke-width:10;stroke-linecap:round;transition:stroke-dashoffset 1.2s ease,stroke 1.2s ease;}
.gauge-num{font-family:var(--font-mono);font-size:20px;font-weight:700;margin-top:-4px;}
.gauge-lbl{font-size:10px;color:var(--text2);}

/* HEATMAP */
.heatmap-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px;}
.hm-cell{border-radius:5px;padding:5px 7px;cursor:pointer;transition:opacity .15s;}
.hm-cell:hover{opacity:.8;}
.hm-sector{font-size:9px;font-family:var(--font-mono);font-weight:700;}
.hm-chg{font-size:10px;font-family:var(--font-mono);font-weight:700;}

/* SCAN OVERLAY */
.scan-overlay{display:none;position:fixed;inset:0;z-index:500;background:rgba(8,12,16,.9);align-items:center;justify-content:center;}
.scan-overlay.open{display:flex;}
.scan-box{background:var(--bg2);border:1px solid var(--border2);border-radius:12px;padding:24px;width:420px;font-family:var(--font-mono);font-size:12px;}
.scan-title{font-size:13px;font-weight:700;color:var(--green);margin-bottom:14px;}
.scan-log{display:flex;flex-direction:column;gap:4px;min-height:110px;}
.scan-line{color:var(--text2);}
.scan-line.cur{color:var(--amber);}.scan-line.done{color:var(--green);}
.scan-prog{margin-top:14px;height:2px;background:var(--border);border-radius:1px;overflow:hidden;}
.scan-bar{height:100%;background:var(--green);border-radius:1px;width:0;transition:width .4s;}
</style>
</head>
<body>
<nav class="navbar" id="navbar"></nav>
<div class="app-shell">
  <div class="ticker-strip"><div class="ticker-inner" id="tickerInner"><span style="padding:0 20px;font-family:var(--font-mono);font-size:11px;color:var(--text3)">Loading market data…</span></div></div>
  <div class="body-area">
    <!-- LEFT -->
    <div class="feed-col">
      <div class="feed-hdr">
        <span class="feed-title">Alpha Signals</span>
        <span class="feed-cnt" id="feedCnt">—</span>
      </div>
      <div class="feed-list" id="feedList">
        <div style="padding:20px;text-align:center;color:var(--text3)"><div class="spinner" style="margin:0 auto 10px"></div><div style="font-size:11px;font-family:var(--font-mono)">Scanning NSE…</div></div>
      </div>
    </div>
    <!-- CENTER -->
    <div class="detail-col" id="detailCol">
      <div class="empty-detail"><div class="empty-icon">📡</div><div class="empty-title">Select a signal</div><div style="font-size:11px;color:var(--text3);margin-top:4px">Live prices · AI briefs · Chart patterns</div></div>
    </div>
    <!-- RIGHT -->
    <div class="sidebar">
      <div class="sb-section">
        <div class="sb-title">Market Sentiment</div>
        <div class="fear-gauge" id="fearGauge">
          <svg class="gauge-svg" viewBox="0 0 120 70" width="120" height="70">
            <path class="gauge-arc-bg" d="M15,60 A50,50 0 0,1 105,60"/>
            <path class="gauge-arc-fill" id="gaugeArc" d="M15,60 A50,50 0 0,1 105,60" stroke="var(--border2)" stroke-dasharray="157" stroke-dashoffset="157"/>
          </svg>
          <div class="gauge-num" id="gaugeNum" style="color:var(--text2)">—</div>
          <div class="gauge-lbl" id="gaugeLbl">Loading…</div>
        </div>
      </div>
      <div class="sb-section">
        <div class="sb-title">Indices</div>
        <div id="mktIndices"><div class="skeleton" style="height:54px;border-radius:5px"></div></div>
      </div>
      <div class="sb-section">
        <div class="sb-title">Gold · Silver · Oil</div>
        <div id="mktCommodities"><div class="skeleton" style="height:70px;border-radius:5px"></div></div>
      </div>
      <div class="sb-section">
        <div class="sb-title">Forex · Crypto</div>
        <div id="mktForex"><div class="skeleton" style="height:54px;border-radius:5px"></div></div>
      </div>
      <div class="sb-section">
        <div class="sb-title">Sector Heatmap</div>
        <div class="heatmap-grid" id="heatmap"><div class="skeleton" style="height:120px;grid-column:1/-1;border-radius:5px"></div></div>
      </div>
    </div>
  </div>
</div>
<div class="scan-overlay" id="scanOverlay">
  <div class="scan-box">
    <div class="scan-title">▣ AlphaScope Full Scan</div>
    <div class="scan-log" id="scanLog"></div>
    <div class="scan-prog"><div class="scan-bar" id="scanBar"></div></div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script src="/js/app.js"></script>
<script>
if (!Auth.requireAuth()) throw new Error('Not logged in');
let signals=[], bookmarks=[], activeSymbol=null, mktData={};
let refreshTimer=null;
const REFRESH_MS=30*60*1000;
window.runScan=runScan;

async function init(){
  renderNav('dashboard');
  const [,bms]=await Promise.all([loadSignals(),refreshBmCount(),loadMarket()]);
  bookmarks=bms;
  scheduleRefresh();
  if(new URLSearchParams(location.search).get('scan')==='1') runScan();
}
function scheduleRefresh(){
  clearTimeout(refreshTimer);
  refreshTimer=setTimeout(()=>{loadSignals(true);loadMarket();},REFRESH_MS);
}

async function loadSignals(force=false){
  const res=await apiGet('/signals'+(force?'?force=true':''));
  if(!res?.ok){toast('Could not load signals','error');return;}
  signals=res.data.signals||[];
  window._alphaSignals=signals;
  renderTicker();renderFeed();
  if(force){toast('Scan complete — '+signals.length+' alpha signals','success');scheduleRefresh();}
}

async function loadMarket(){
  const res=await apiGet('/market');
  if(!res?.ok)return;
  mktData=res.data.market||{};
  renderSentiment(res.data.sentiment_score,res.data.sentiment);
  renderMarketItems();
  renderHeatmap();
  renderTicker();
}

function buildTickerItems(){
  const items=[];
  signals.forEach(s=>items.push({type:s.sector||'NSE',sym:s.symbol,label:s.symbol,priceStr:'₹'+s.price.toFixed(2),chg:s.change_pct,clickable:true}));
  const add=(key,type,fmt)=>{const d=mktData[key];if(d&&d.price)items.push({type,sym:null,label:d.label,priceStr:fmt(d.price),chg:d.change_pct||0,clickable:false});};
  add('nifty50','INDEX',p=>p.toLocaleString('en-IN',{maximumFractionDigits:0}));
  add('sensex','INDEX',p=>p.toLocaleString('en-IN',{maximumFractionDigits:0}));
  add('gold','GOLD',p=>'$'+p.toFixed(1));
  add('silver','SILVER',p=>'$'+p.toFixed(2));
  add('crude','OIL',p=>'$'+p.toFixed(2));
  add('usdinr','USD/INR',p=>'₹'+p.toFixed(2));
  add('btc','BTC',p=>'$'+p.toLocaleString('en-US',{maximumFractionDigits:0}));
  add('indiavix','VIX',p=>p.toFixed(2));
  return items;
}

function renderTicker(){
  const items=buildTickerItems();
  if(!items.length)return;
  const doubled=[...items,...items];
  const inner=document.getElementById('tickerInner');
  inner.style.animationDuration=(doubled.length*2.5)+'s';
  inner.innerHTML=doubled.map(t=>{
    const up=t.chg>=0;
    return `<span class="tk" ${t.clickable?`onclick="selectBySymbol('${t.sym}')"`:''}>
      <span class="tk-type">${t.type}</span>
      <span class="tk-sym">${t.label}</span>
      <span class="tk-price">${t.priceStr}</span>
      <span class="${up?'tk-up':'tk-dn'}">${up?'+':''}${t.chg.toFixed(2)}%</span>
    </span>`;
  }).join('');
}

function selectBySymbol(sym){const sig=signals.find(s=>s.symbol===sym);if(sig)selectSignal(sym);}

function renderFeed(){
  const list=document.getElementById('feedList');
  document.getElementById('feedCnt').textContent=signals.length;
  if(!signals.length){
    list.innerHTML=`<div style="padding:24px;text-align:center;color:var(--text3)"><div style="font-size:28px;margin-bottom:8px">🔍</div><div style="font-family:var(--font-mono);font-size:11px">No alpha signals yet</div><div style="font-size:10px;margin-top:4px">Click SCAN to run a fresh scan</div></div>`;
    return;
  }
  list.innerHTML='';
  signals.forEach((sig,idx)=>{
    const el=document.createElement('div');
    el.className='sig-card'+(sig.symbol===activeSymbol?' active':'');
    el.id='sc-'+sig.symbol;
    const up=sig.change_pct>=0;
    const bm=bookmarks.some(b=>b.symbol===sig.symbol);
    const cf=Math.round((sig.chart_strength||0)*100);
    const rf=Math.min(100,(sig.radar_score||0)*10);
    const chips=(sig.chart_patterns||[]).map(p=>`<span class="chip chip-p">${p.length>14?p.slice(0,13)+'…':p}</span>`).join('');
    el.innerHTML=`
      <div class="sc-top">
        <div class="sc-l"><div class="sc-sym">${sig.symbol}</div><div class="sc-name">${sig.name}</div></div>
        <div class="sc-r">
          <button class="bm-star ${bm?'on':''}" data-sym="${sig.symbol}" onclick="toggleBm('${sig.symbol}','${sig.name.replace(/'/g,"\\'")}','${sig.sector}',${sig.price});event.stopPropagation()">${bm?'★':'☆'}</button>
          <span class="badge ${convBadgeClass(sig.conviction)}" style="font-size:8px">${sig.conviction}</span>
        </div>
      </div>
      <div class="pr-row"><span class="pr-big">₹${sig.price.toFixed(2)}</span><span class="pr-chg ${up?'up':'dn'}">${up?'+':''}${sig.change_pct.toFixed(2)}%</span></div>
      <div class="chips">${chips}<span class="chip chip-r">Radar ${sig.radar_score}pt</span></div>
      <div class="sc-bars">
        <div class="bar-item"><div class="bar-lbl">Chart</div><div class="bar-wrap"><div class="bar-bg"><div class="bar-fill" style="width:${cf}%;background:var(--purple)"></div></div><div class="bar-n">${cf}%</div></div></div>
        <div class="bar-item"><div class="bar-lbl">Radar</div><div class="bar-wrap"><div class="bar-bg"><div class="bar-fill" style="width:${rf}%;background:var(--blue)"></div></div><div class="bar-n">${sig.radar_score}/10</div></div></div>
      </div>`;
    el.addEventListener('click',()=>selectSignal(sig.symbol));
    list.appendChild(el);
    if(idx===0)setTimeout(()=>selectSignal(sig.symbol),250);
  });
}

function selectSignal(symbol){
  activeSymbol=symbol;
  document.querySelectorAll('.sig-card').forEach(c=>c.classList.remove('active'));
  document.getElementById('sc-'+symbol)?.classList.add('active');
  const sig=signals.find(s=>s.symbol===symbol);
  if(sig)renderDetail(sig);
}

function renderDetail(sig){
  const up=sig.change_pct>=0;
  const bm=bookmarks.some(b=>b.symbol===sig.symbol);
  const wr=Math.round((sig.chart_winrate||0)*100);
  const cp=convPct(sig.conviction);const cc=convColor(sig.conviction);
  const low52=sig.low_52w||sig.price*.78;const high52=sig.high_52w||sig.price*1.22;
  const rPos=Math.min(97,Math.max(3,Math.round(((sig.price-low52)/(high52-low52))*100)));
  const evHTML=(sig.radar_events||[]).map(e=>`<div class="ev-item"><div class="ev-score">+${e.score}</div><div class="ev-desc">${e.desc}</div></div>`).join('');
  const patHTML=(sig.chart_patterns||[]).map(p=>`<div class="pat-name">${p}</div>`).join('');
  document.getElementById('detailCol').innerHTML=`
    <div class="d-hdr">
      <div><div class="d-sym">${sig.symbol}</div><div class="d-name">${sig.name}</div><span class="d-sector">${sig.sector}</span></div>
      <div class="d-price-block">
        <div class="d-price">₹${sig.price.toFixed(2)}</div>
        <div class="pr-chg ${up?'up':'dn'}">${up?'+':''}${sig.change_pct.toFixed(2)}% today</div>
        <button class="bm-detail-btn ${bm?'on':''}" id="bmDetailBtn" onclick="toggleBm('${sig.symbol}','${sig.name.replace(/'/g,"\\'")}','${sig.sector}',${sig.price})">${bm?'★ Bookmarked':'☆ Bookmark'}</button>
      </div>
    </div>
    <div class="cm-wrap">
      <div class="cm-lbl">Alpha Conviction</div>
      <div class="cm-track"><div class="cm-fill" style="width:${cp}%;background:${cc}"></div></div>
      <div class="cm-val" style="color:${cc}">${sig.conviction}</div>
    </div>
    <div class="range-box">
      <div style="display:flex;justify-content:space-between;margin-bottom:4px">
        <span style="font-family:var(--font-mono);font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.8px">52-Week Range</span>
        <span style="font-family:var(--font-mono);font-size:10px;color:var(--amber)">₹${sig.price.toFixed(2)} now</span>
      </div>
      <div class="range-track"><div class="range-gradient"></div><div class="range-dot" style="left:${rPos}%"></div></div>
      <div class="range-labels"><span>₹${low52.toFixed(0)}</span><span>₹${high52.toFixed(0)}</span></div>
    </div>
    <div class="chart-box">
      <div class="chart-hdr"><span class="chart-lbl">Price Chart</span>
        <div class="chart-tabs">
          <button class="c-tab active" onclick="switchChart('price',this)">Price</button>
          <button class="c-tab" onclick="switchChart('rsi',this)">RSI</button>
          <button class="c-tab" onclick="switchChart('volume',this)">Volume</button>
        </div>
      </div>
      <div class="chart-wrap"><canvas id="mainChart"></canvas></div>
    </div>
    <div class="two-col">
      <div class="box">
        <div class="box-t">▲ Chart Patterns</div>
        ${patHTML||'<div style="color:var(--text3);font-size:11px">No patterns detected</div>'}
        <div class="pat-det" style="margin-top:5px">${sig.chart_details||''}</div>
        <div class="wr-row"><div class="wr-lbl">Win rate</div><div class="wr-bg"><div class="wr-fill" style="width:${wr}%"></div></div><div class="wr-pct">${wr}%</div></div>
      </div>
      <div class="box">
        <div class="box-t">◉ Opportunity Radar</div>
        ${evHTML||'<div style="color:var(--text3);font-size:11px">No events detected</div>'}
        <div style="margin-top:8px;display:flex;align-items:center;gap:6px"><span style="font-size:9px;color:var(--text3);font-family:var(--font-mono)">Score</span><span style="font-family:var(--font-mono);font-size:13px;font-weight:700;color:var(--blue)">${sig.radar_score}/10</span></div>
      </div>
    </div>
    <div class="brief-box" id="briefBox">
      <div class="brief-hdr"><span class="brief-tag">AI BRIEF</span><span style="font-size:9px;color:var(--text3);font-family:var(--font-mono)" id="briefMeta">Fetching live…</span></div>
      <div id="briefContent"><div style="display:flex;align-items:center;gap:8px;color:var(--text2);font-size:11px"><div class="spinner" style="width:14px;height:14px"></div>Claude + web search running…</div></div>
    </div>
    <div style="text-align:center;padding-bottom:8px">
      <a href="/pages/stock.html?symbol=${sig.symbol}&name=${encodeURIComponent(sig.name)}&sector=${encodeURIComponent(sig.sector)}" style="font-size:11px;color:var(--blue);font-family:var(--font-mono)">↗ Full stock page</a>
    </div>`;
  destroyCharts();
  drawChart('mainChart','price',sig);
  loadAIBrief(sig.symbol,sig);
}

async function loadAIBrief(symbol,fallback){
  const res=await apiGet('/analysis?symbol='+symbol);
  const meta=document.getElementById('briefMeta');
  const content=document.getElementById('briefContent');
  if(!content)return;
  if(!res?.ok){content.innerHTML=`<div class="brief-text">${fallback?.ai_brief||'Could not load brief.'}</div>`;if(meta)meta.textContent='Cached';return;}
  const d=res.data;
  if(meta)meta.textContent='Live · '+(d.analyzed_at?new Date(d.analyzed_at).toLocaleTimeString():'');
  content.innerHTML=`<div class="brief-text">${d.ai_brief}</div>`;
}

function switchChart(type,btn){
  document.querySelectorAll('.c-tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  const sig=signals.find(s=>s.symbol===activeSymbol);
  if(sig)drawChart('mainChart',type,sig);
}

// ── BOOKMARKS (FIXED) ─────────────────────────────────────────────────────────
async function toggleBm(symbol,name,sector,price){
  const isBm=bookmarks.some(b=>b.symbol===symbol);
  if(isBm){
    await apiDel('/bookmarks/'+encodeURIComponent(symbol));
    toast(symbol+' removed from bookmarks','warn');
  } else {
    const res=await apiPost('/bookmarks',{symbol,name,sector,price:Number(price)});
    if(!res?.ok){toast('Could not bookmark — try again','error');return;}
    toast('★ '+symbol+' bookmarked','success');
  }
  bookmarks=await refreshBmCount();
  _updateBmUI(symbol);
}

function _updateBmUI(symbol){
  const on=bookmarks.some(b=>b.symbol===symbol);
  document.querySelectorAll(`[data-sym="${symbol}"]`).forEach(btn=>{btn.classList.toggle('on',on);btn.textContent=on?'★':'☆';});
  const db=document.getElementById('bmDetailBtn');
  if(db){db.classList.toggle('on',on);db.textContent=on?'★ Bookmarked':'☆ Bookmark';}
}

// ── MARKET SIDEBAR ─────────────────────────────────────────────────────────────
function renderSentiment(score,label){
  const arc=document.getElementById('gaugeArc');
  const num=document.getElementById('gaugeNum');
  const lbl=document.getElementById('gaugeLbl');
  if(!arc||score==null)return;
  const offset=Math.round(157-(score/100)*157);
  const color=score<35?'#f85149':score<55?'#e3b341':'#3fb950';
  arc.style.strokeDashoffset=offset;arc.style.stroke=color;
  if(num){num.textContent=score;num.style.color=color;}
  if(lbl)lbl.textContent=label||'—';
}

function mktRow(d,fmt){
  if(!d||!d.price)return'';
  const up=d.change_pct>=0;
  return`<div class="mkt-item">
    <div><div class="mkt-label">${d.label}</div>${d.unit?`<div class="mkt-sub">${d.unit}</div>`:''}</div>
    <div><div class="mkt-price">${fmt(d.price)}</div><div class="mkt-chg ${up?'up':'dn'}">${up?'+':''}${(d.change_pct||0).toFixed(2)}%</div></div>
  </div>`;
}

function renderMarketItems(){
  const inr=p=>'₹'+p.toLocaleString('en-IN',{maximumFractionDigits:0});
  const usd=p=>'$'+p.toFixed(2);
  const usd0=p=>'$'+p.toLocaleString('en-US',{maximumFractionDigits:0});
  const fx=p=>'₹'+p.toFixed(2);
  document.getElementById('mktIndices').innerHTML=mktRow(mktData.nifty50,inr)+mktRow(mktData.sensex,inr)+mktRow(mktData.indiavix,p=>p.toFixed(2));
  document.getElementById('mktCommodities').innerHTML=mktRow(mktData.gold,usd)+mktRow(mktData.silver,usd)+mktRow(mktData.crude,usd);
  document.getElementById('mktForex').innerHTML=mktRow(mktData.usdinr,fx)+mktRow(mktData.btc,usd0);
}

function renderHeatmap(){
  const sectors=[
    {name:'IT',chg:sectorAvg('IT')},{name:'Banking',chg:sectorAvg('Banking')},
    {name:'Pharma',chg:sectorAvg('Pharma')},{name:'Auto',chg:sectorAvg('Auto')},
    {name:'Energy',chg:sectorAvg('Energy')},{name:'FMCG',chg:sectorAvg('FMCG')},
    {name:'NBFC',chg:sectorAvg('NBFC')},{name:'Tech',chg:sectorAvg('Tech')},
  ];
  document.getElementById('heatmap').innerHTML=sectors.map(s=>{
    const up=s.chg>=0;
    const intensity=Math.min(1,Math.abs(s.chg)/3);
    const bg=up?`rgba(63,185,80,${.15+intensity*.5})`:`rgba(248,81,73,${.15+intensity*.5})`;
    const col=up?'var(--green)':'var(--red)';
    return`<div class="hm-cell" style="background:${bg}">
      <div class="hm-sector" style="color:${col}">${s.name}</div>
      <div class="hm-chg" style="color:${col}">${up?'+':''}${s.chg.toFixed(2)}%</div>
    </div>`;
  }).join('');
}

function sectorAvg(sector){
  const ss=signals.filter(s=>s.sector===sector);
  if(!ss.length)return+(Math.random()*4-2).toFixed(2);
  return +(ss.reduce((a,s)=>a+s.change_pct,0)/ss.length).toFixed(2);
}

// ── SCAN ──────────────────────────────────────────────────────────────────────
async function runScan(){
  const overlay=document.getElementById('scanOverlay');
  const log=document.getElementById('scanLog');
  const bar=document.getElementById('scanBar');
  overlay.classList.add('open');log.innerHTML='';bar.style.width='0%';
  const steps=['Connecting to Yahoo Finance NSE feed…','Fetching live OHLCV for 15 stocks…','Computing SMAs, RSI, Bollinger Bands…','Running 5-pattern chart detector…','Scoring opportunity radar signals…','Cross-validating dual-confirmation setups…','Calling Claude + web search for briefs…','Ranking signals by conviction score…'];
  steps.forEach((text,i)=>{
    setTimeout(()=>{
      const line=document.createElement('div');
      line.className='scan-line cur';
      line.textContent=`[${String(i+1).padStart(2,'0')}/${steps.length}] ${text}`;
      if(log.children[i-1])log.children[i-1].className='scan-line done';
      log.appendChild(line);
      bar.style.width=Math.round((i+1)/steps.length*100)+'%';
    },i*650);
  });
  const [sigRes]=await Promise.all([apiGet('/signals?force=true'),loadMarket()]);
  setTimeout(()=>{
    overlay.classList.remove('open');
    if(sigRes?.ok){signals=sigRes.data.signals||[];window._alphaSignals=signals;renderTicker();renderFeed();toast('Scan complete — '+signals.length+' alpha signals','success');}
    else toast('Scan failed','error');
    scheduleRefresh();
  },steps.length*650+500);
}

init();
</script>
